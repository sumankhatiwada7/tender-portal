services:
  mongodb:
    image: mongo:7
    container_name: queue-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: queue-backend:latest
    container_name: queue-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/queue_system
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend/vite-project
      dockerfile: Dockerfile
    image: queue-frontend:latest
    container_name: queue-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data: